<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>463 Quizzes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="layout">
        <section class="control-card">
          <div class="hero-copy merged">
            <p class="eyebrow">CSE 463 Final Review</p>
            <h1>463 Quizzes</h1>
          </div>

          <div class="card-header">
            <p>Select the units you want to practice.</p>
          </div>

          <div class="control-grid">
            <label class="field">
              <span>Question Count</span>
              <input
                id="question-count"
                type="number"
                min="1"
                inputmode="numeric"
                placeholder="Type a number"
              />
              <small class="field-help" id="question-count-help">
                Type a number up to the available max for the selected units.
              </small>
            </label>

            <label class="field checkbox-field">
              <input type="checkbox" id="shuffle-toggle" checked />
              <span>Shuffle questions and answer choices</span>
            </label>

            <label class="field checkbox-field">
              <input type="checkbox" id="unit-label-toggle" />
              <span>Show unit numbers only</span>
            </label>
          </div>

          <div class="unit-strip selectable" id="unit-strip"></div>

          <div class="button-row">
            <button class="primary-button" id="start-button">Start Quiz</button>
            <button class="ghost-button" id="all-units-button">Select All Units</button>
            <button class="ghost-button" id="clear-units-button">Clear Units</button>
          </div>
        </section>

        <section class="quiz-card hidden" id="quiz-card">
          <div class="quiz-topline">
            <div>
              <p class="eyebrow">Current Question</p>
              <h2 id="quiz-title">Question</h2>
              <p class="topic-line" id="topic-line">Topic</p>
            </div>
            <span class="unit-badge" id="unit-badge">Unit</span>
          </div>

          <div class="progress-meta">
            <span id="progress-text">Question 1 of 10</span>
            <span id="score-text">Score: 0</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>

          <article class="question-shell">
            <p class="question-text" id="question-text"></p>
            <div class="options" id="options"></div>
          </article>

          <section class="feedback hidden" id="feedback">
            <p class="feedback-result" id="feedback-result"></p>
            <p class="feedback-explanation" id="feedback-explanation"></p>
          </section>

          <div class="button-row">
            <button class="primary-button hidden" id="next-button">Next Question</button>
            <button class="ghost-button" id="restart-button">Restart</button>
          </div>
        </section>

        <section class="results-card hidden" id="results-card">
          <div class="card-header">
            <h2>Results</h2>
            <p id="results-summary"></p>
          </div>

          <div class="results-grid">
            <div class="result-stat">
              <span class="stat-label">Correct</span>
              <strong id="correct-count">0</strong>
            </div>
            <div class="result-stat">
              <span class="stat-label">Accuracy</span>
              <strong id="accuracy-count">0%</strong>
            </div>
            <div class="result-stat">
              <span class="stat-label">Reviewed Units</span>
              <strong id="reviewed-units">0</strong>
            </div>
          </div>

          <div class="review-list" id="review-list"></div>

          <div class="button-row">
            <button class="primary-button" id="try-again-button">Try Again</button>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
